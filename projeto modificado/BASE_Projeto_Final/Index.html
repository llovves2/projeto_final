<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="index.css/index.css">    
  </head>
  <body>
  <section>
        <nav id="links"><a href="pedido.html">Lista Pedidos</a>
        <nav id="links"><a href="cliente.html">Lista de Clientes</a>
    </section>
    <section>
      <img src="img/AR_imports_logo.png" alt="imagem louca">

    </section>
    <h2>Novo Produto</h2>
    <form id="formProduto">
      <label>Nome do Produto:</label>
      <input type="text" id="nome" placeholder="Nome do Produto" required />
      <label>Preço do Produto:</label>
      <input
        type="number"
        id="preco"
        step="0.01"
        placeholder="Preço (Ex: 25.90)"
        required
      />
      <label>Etoque do Produto: </label>
      <input
        type="number"
        id="estoque"
        placeholder="Quantidade em Estoque"
        required
      />
      <button id="btnSalvar" type="submit">Cadastrar Produto</button>
      <button
        type="button"
        id="btnCancelar"
        style="display: none; background-color: red; color: white"
      >
        Cancelar
      </button>
    </form>
    <p id="mensagemProduto"></p>

    <h3>Produtos</h3>
    <table border="1 "  id="tabelaProdutos">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Preço</th>
          <th>Estoque</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <hr />  
  </body>
</html>
